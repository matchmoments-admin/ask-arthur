name: DR — Daily Logical pg_dump → R2

# Phase 9.2 of the data-model improvement plan: daily logical Postgres
# dump pushed to R2 with Object Lock Compliance mode + versioning. This
# is the cold-tier DR layer (RPO ~24h, RTO ~hours) that protects against:
#   - Account compromise (PITR window expires faster than discovery)
#   - Region outage (Supabase Sydney down)
#   - Post-PITR-window incidents (>7-day-old corruption discovery)
#
# See docs/ops/dr-plan.md §"Long-term cold" for the layered DR design.
#
# REQUIRED ONE-TIME SETUP (gates the workflow until done):
#   1. Create an R2 bucket (e.g. `safeverify-dr`) in the Cloudflare
#      dashboard with:
#        - Object Lock: Compliance mode, default retention 30 days
#        - Versioning: enabled
#        - Lifecycle rule: delete versions older than 90 days
#   2. Create an R2 API token with Object Read & Write scoped to that
#      bucket. Capture: Account ID, Access Key ID, Secret Access Key.
#   3. Add GitHub secrets:
#        SUPABASE_DB_URL        — already exists per scrape-feeds.yml
#        R2_ACCOUNT_ID          — Cloudflare account UUID
#        R2_DR_BUCKET           — bucket name (e.g. safeverify-dr)
#        R2_DR_ACCESS_KEY_ID    — from token creation
#        R2_DR_SECRET_ACCESS_KEY — from token creation
#   4. Add GitHub variable: ENABLE_DR_DUMP=true to enable the cron.
#
# Until ENABLE_DR_DUMP is set, the workflow is dispatch-only (no
# scheduled runs) so a partially-configured deploy doesn't fail nightly.

on:
  schedule:
    - cron: '0 17 * * *'  # 17:00 UTC = 03:00 AEST (off-peak; after the
                          # 02:30 retention pipeline finishes its work)
  workflow_dispatch: {}

jobs:
  dump:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_DR_DUMP == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_DR_BUCKET: ${{ secrets.R2_DR_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_DR_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_DR_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto  # R2 ignores region but the AWS CLI
                                # requires the variable to be set
    steps:
      - name: Pre-flight — verify required secrets
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${SUPABASE_DB_URL:-}" ]] && missing+=(SUPABASE_DB_URL)
          [[ -z "${R2_ACCOUNT_ID:-}" ]] && missing+=(R2_ACCOUNT_ID)
          [[ -z "${R2_DR_BUCKET:-}" ]] && missing+=(R2_DR_BUCKET)
          [[ -z "${AWS_ACCESS_KEY_ID:-}" ]] && missing+=(R2_DR_ACCESS_KEY_ID)
          [[ -z "${AWS_SECRET_ACCESS_KEY:-}" ]] && missing+=(R2_DR_SECRET_ACCESS_KEY)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "See .github/workflows/dr-pg-dump.yml header for setup instructions."
            exit 1
          fi

      - name: Install Postgres 16 client (matches Supabase server version)
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          sudo sh -c 'echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: pg_dump → gzip → sha256
        id: dump
        run: |
          set -euo pipefail
          mkdir -p dump
          DATE_UTC="$(date -u +%Y-%m-%d)"
          TS_UTC="$(date -u +%Y%m%dT%H%M%SZ)"

          # Use --format=custom for a faster restore + smaller dump than
          # plain SQL. --no-owner / --no-acl keeps the dump portable.
          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            --exclude-schema=storage \
            --exclude-schema=auth \
            --exclude-schema=realtime \
            --exclude-schema=supabase_functions \
            --exclude-schema=net \
            --exclude-schema=pgsodium \
            --exclude-schema=vault \
            --file="dump/safeverify-${TS_UTC}.dump" \
            "${SUPABASE_DB_URL}"

          SIZE_BYTES=$(stat -c%s "dump/safeverify-${TS_UTC}.dump")
          SHA256=$(sha256sum "dump/safeverify-${TS_UTC}.dump" | cut -d' ' -f1)
          KEY="safeverify-dr/${DATE_UTC}/safeverify-${TS_UTC}-${SHA256:0:16}.dump"

          echo "size_bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "local_path=dump/safeverify-${TS_UTC}.dump" >> "$GITHUB_OUTPUT"

          echo "::notice::Dump size: $((SIZE_BYTES / 1024 / 1024)) MB"
          echo "::notice::SHA-256: ${SHA256}"

      - name: Upload to R2 (Object Lock Compliance enforced bucket-wide)
        run: |
          set -euo pipefail
          KEY="${{ steps.dump.outputs.key }}"
          aws --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            s3 cp \
            "${{ steps.dump.outputs.local_path }}" \
            "s3://${R2_DR_BUCKET}/${KEY}" \
            --metadata "sha256=${{ steps.dump.outputs.sha256 }},size_bytes=${{ steps.dump.outputs.size_bytes }}"
          echo "::notice::Uploaded to s3://${R2_DR_BUCKET}/${KEY}"

      - name: Verify upload (HEAD request returns expected sha256 metadata)
        run: |
          set -euo pipefail
          KEY="${{ steps.dump.outputs.key }}"
          EXPECTED_SHA="${{ steps.dump.outputs.sha256 }}"
          METADATA=$(aws --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            s3api head-object \
            --bucket "${R2_DR_BUCKET}" \
            --key "${KEY}" \
            --query 'Metadata.sha256' --output text)
          if [[ "${METADATA}" != "${EXPECTED_SHA}" ]]; then
            echo "::error::SHA-256 mismatch on uploaded object: expected ${EXPECTED_SHA}, got ${METADATA}"
            exit 1
          fi
          echo "::notice::Verified upload integrity"

      - name: Cleanup local dump
        if: always()
        run: rm -rf dump
