name: Clone Watch → LinkedIn (monthly)

# Recurring "Australian Clone Watch" LinkedIn post — design in
# docs/ops/clone-watch-linkedin-automation.md.
#
#   prepare  → renders the 7-slide carousel PDF against PROD + generates the
#              deterministic caption (numbers reconcile to the digest) + pings
#              Telegram with the run link and the caption for review.
#   publish  → GATED behind the `clone-watch-linkedin` Environment (required
#              reviewer = the founder). On approval, publishes to the Ask Arthur
#              company page and confirms with the post URL + the first comment to
#              paste (LinkedIn Dev-Tier can't post comments) + a reshare nudge.
#
# Dry run passed 2026-07-05 (render→caption→artifact→Telegram all green, approval
# gate paused correctly). Cron ENABLED — first auto-post is the July edition
# (~Aug 2). Every run still requires founder approval before publishing.

on:
  workflow_dispatch:
    inputs:
      month:
        description: "Report month YYYY-MM (blank = prior calendar month)"
        required: false
        type: string
  schedule:
    - cron: "0 1 2 * *" # 2nd of month 01:00 UTC (~11:00 AEST), after the summary snapshot cron

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      month: ${{ steps.month.outputs.value }}
      title: ${{ steps.caption.outputs.title }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve report month
        id: month
        env:
          MONTH_INPUT: ${{ inputs.month }}
        run: |
          if [ -n "$MONTH_INPUT" ]; then
            M="$MONTH_INPUT"
          else
            # first-of-this-month minus one day → last day of the prior month.
            M=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m)
          fi
          echo "value=$M" >> "$GITHUB_OUTPUT"
          echo "Report month: $M"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Chromium for Puppeteer
        run: pnpm --filter @askarthur/web exec puppeteer browsers install chrome

      - name: Render carousel PDF (against prod)
        working-directory: apps/web
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          MONTH: ${{ steps.month.outputs.value }}
        run: pnpm report-card:export -- --base=https://askarthur.au --month="$MONTH" --out=out

      - name: Generate caption
        id: caption
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          pnpm clone-watch:caption -- --month="$MONTH" --out=out
          echo "title=$(cat out/title.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload edition artifact
        uses: actions/upload-artifact@v4
        with:
          name: clone-watch-edition
          path: apps/web/out
          retention-days: 14

      - name: Telegram — ready for review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: ${{ steps.caption.outputs.title }}
        working-directory: apps/web
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "Telegram not configured — skipping ping"; exit 0
          fi
          PREVIEW=$(head -c 900 out/caption.txt)
          TEXT=$(printf '🕵️ *%s* is ready for review.\n\nApprove the publish here → %s\n\nCaption preview:\n%s' "$TITLE" "$RUN_URL" "$PREVIEW")
          curl -sS -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_ADMIN_CHAT_ID" \
            --data-urlencode "text=$TEXT" \
            --data-urlencode "parse_mode=Markdown" >/dev/null

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    # The approval gate: this Environment must have a required reviewer (the
    # founder). The job pauses here until approved in the GitHub Actions UI.
    environment: clone-watch-linkedin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download edition artifact
        uses: actions/download-artifact@v4
        with:
          name: clone-watch-edition
          path: apps/web/out

      - name: Publish to LinkedIn (guarded — company page)
        id: publish
        working-directory: apps/web
        env:
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONTH: ${{ needs.prepare.outputs.month }}
          TITLE: ${{ needs.prepare.outputs.title }}
        run: |
          set -o pipefail
          # clone-watch:publish self-guards: it SKIPS (green) if this month already
          # has a recorded post URN, and records the URN after a successful post —
          # so this step is safe to re-run and can't double-post.
          pnpm clone-watch:publish -- \
            --pdf="out/clone-watch-$MONTH.pdf" \
            --caption-file=out/caption.txt \
            --comment="$(cat out/first-comment.txt)" \
            --title="$TITLE" \
            --month="$MONTH" | tee publish.log
          # `|| true` so a parse miss can't red the step after a live post.
          echo "result=$(grep -m1 -oE 'RESULT=[a-z]+' publish.log | cut -d= -f2 || true)" >> "$GITHUB_OUTPUT"
          echo "url=$(grep -m1 -oE 'URL=[^[:space:]]+' publish.log | cut -d= -f2 || true)" >> "$GITHUB_OUTPUT"

      - name: Telegram — published + manual steps
        if: always() && steps.publish.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          POST_URL: ${{ steps.publish.outputs.url }}
          RESULT: ${{ steps.publish.outputs.result }}
          MONTH: ${{ needs.prepare.outputs.month }}
        working-directory: apps/web
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "Telegram not configured — skipping ping"; exit 0
          fi
          if [ "$RESULT" = "skipped" ]; then
            TEXT=$(printf '⏭ Clone Watch: %s was already posted (%s) — skipped, no double-post.' "$MONTH" "$POST_URL")
          else
            COMMENT=$(cat out/first-comment.txt)
            TEXT=$(printf '✅ *Published:* %s\n\nTwo manual steps (Dev-Tier cannot do these):\n1️⃣ Paste this as the FIRST COMMENT:\n%s\n\n2️⃣ Reshare from your personal profile for reach.' "$POST_URL" "$COMMENT")
          fi
          curl -sS -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_ADMIN_CHAT_ID" \
            --data-urlencode "text=$TEXT" \
            --data-urlencode "parse_mode=Markdown" >/dev/null

      - name: Telegram — publish failed
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then exit 0; fi
          TEXT=$(printf '⚠️ Clone Watch publish FAILED after approval. Check the run before re-running (a re-run may double-post): %s' "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TELEGRAM_ADMIN_CHAT_ID" \
            --data-urlencode "text=$TEXT" >/dev/null
