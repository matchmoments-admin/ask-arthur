name: autofix.ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint --fix (affected only)
        run: |
          pnpm turbo run lint --filter="...[origin/${{ github.base_ref }}]" -- --fix || true

      - name: Prettier --write
        run: pnpm exec prettier --write . || true

      - uses: autofix-ci/action@v1
        with:
          fail-fast: false
