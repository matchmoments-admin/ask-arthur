name: Deploy
on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who triggered this deploy'
        required: false
        default: 'manual'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log trigger
        run: echo "Deploy triggered by ${{ github.event.inputs.triggered_by }}"

