name: Scrape Threat Feeds

# Tiered cron — each tier matches the upstream's update cadence so we don't
# burn CI minutes on no-op fetches. RSS scrapers also send If-None-Match /
# If-Modified-Since via common/http_cache.py, so unchanged feeds short-circuit
# server-side too.
on:
  schedule:
    - cron: '0 */3 * * *'    # tier-3h: AU regulator narratives (latency-sensitive)
    - cron: '0 */6 * * *'    # tier-6h: high-velocity IOC feeds + Reddit
    - cron: '0 */12 * * *'   # tier-12h: bulk IOC mirrors
    - cron: '0 16 * * *'     # tier-daily: snapshots (02:00 AEST)
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to scrape (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - scamwatch_alerts
          - acsc_alerts
          - asic_investor_alerts
          - probe_acsc
          - urlhaus
          - openphish
          - phishtank
          - phishstats
          - phishing_database
          - phishing_army
          - feodo
          - ipsum
          - spamhaus
          - abuseipdb
          - crtsh
          - reddit
          - acnc_register
          - pfra_members
          - austrac

jobs:
  scrape:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCRAPER == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: pipeline/scrapers
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pipeline/scrapers
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/scrapers/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ──────────────────────────────────────────────────────────────────
      # tier-3h — AU regulator narrative scrapers (highest priority)
      # ──────────────────────────────────────────────────────────────────
      - name: Scamwatch alerts (HTML narrative)
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'scamwatch_alerts'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */3 * * *' || github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m scamwatch_alerts

      - name: ACSC alerts + advisories (RSS)
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'acsc_alerts'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */3 * * *' || github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m acsc_alerts

      # One-shot diagnostic probe — workflow_dispatch only. Captures HTTP
      # status, timing, and headers across multiple UA/method permutations
      # so we can pinpoint exactly what cyber.gov.au is doing to GH-runner
      # IPs. See pipeline/scrapers/probe_acsc.py for the matrix.
      - name: Probe cyber.gov.au (diagnostic)
        if: github.event.inputs.feed == 'probe_acsc'
        run: python -m probe_acsc

      # ──────────────────────────────────────────────────────────────────
      # tier-6h — high-velocity IOC feeds + Reddit
      # ──────────────────────────────────────────────────────────────────
      - name: URLhaus
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'urlhaus'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m urlhaus

      - name: OpenPhish
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'openphish'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m openphish

      - name: PhishTank
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishtank'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m phishtank

      # ThreatFox — DISABLED 2026-05-11. abuse.ch API key returning 401
      # Unauthorized since 2026-02-23 (80+ days of error rows). Coverage
      # overlap with urlhaus/phishtank/openphish, so removing rather than
      # rotating. To re-enable: rotate THREATFOX_AUTH_KEY at
      # https://auth.abuse.ch, restore this step + the choice option above,
      # and revert pipeline/scrapers/threatfox.py if any drift accumulated.

      # ──────────────────────────────────────────────────────────────────
      # tier-12h — bulk IOC mirrors (high overlap with tier-6h, slower)
      # ──────────────────────────────────────────────────────────────────
      - name: PhishStats
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishstats'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m phishstats

      - name: Phishing.Database
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_database'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m phishing_database

      - name: Phishing Army
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_army'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m phishing_army

      - name: Feodo Tracker
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'feodo'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m feodo

      - name: Spamhaus DROP/EDROP
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'spamhaus'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */12 * * *' || github.event.schedule == '0 16 * * *'))
        run: python -m spamhaus

      # ──────────────────────────────────────────────────────────────────
      # tier-daily — snapshots and lower-velocity sources (02:00 AEST)
      # ──────────────────────────────────────────────────────────────────
      - name: ASIC Investor Alert List (JSON snapshot)
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'asic_investor_alerts'
          || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *')
        run: python -m asic_investor_alerts

      # AUSTRAC media releases — RSS (PR-B3 v131). Money-mule + payments-fraud
      # typology reports. Low-volume (~1-3 releases/week), so daily is enough.
      - name: AUSTRAC media releases (RSS narrative)
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'austrac'
          || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *')
        run: python -m austrac

      - name: IPsum
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'ipsum'
          || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *')
        run: python -m ipsum

      - name: AbuseIPDB seed
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'abuseipdb'
          || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *')
        env:
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: python -m abuseipdb

      # CryptoScamDB — DISABLED 2026-05-11. Source repo returns 404 at
      # raw.githubusercontent.com (project archived/moved). To re-enable:
      # update SOURCE_URL in pipeline/scrapers/cryptoscamdb.py to a working
      # mirror, then restore this step + the choice option above.

      - name: crt.sh
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'crtsh'
          || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *')
        run: python -m crtsh

      # ACNC Charity Register mirror — gated independently of ENABLE_SCRAPER.
      - name: Scrape ACNC Charity Register
        if: |
          (github.event.inputs.feed == 'all' || github.event.inputs.feed == 'acnc_register'
           || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *'))
          && vars.ENABLE_CHARITY_CHECK_INGEST == 'true'
        env:
          FF_CHARITY_CHECK_INGEST: 'true'
        run: python -m acnc_register

      # PFRA member registry — quarterly upstream, daily probe is mostly no-op.
      - name: Scrape PFRA member registry
        if: |
          (github.event.inputs.feed == 'all' || github.event.inputs.feed == 'pfra_members'
           || (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *'))
          && vars.ENABLE_CHARITY_CHECK_INGEST == 'true'
        env:
          FF_CHARITY_CHECK_INGEST: 'true'
        run: python -m pfra_members

      # Reddit — kept on its own daily 06:00 UTC slot (matched here by 0 16
      # for daily, but we still want the original cadence to avoid double-runs
      # on the 6h/12h/3h tiers). Restrict Reddit to the daily and 6h tiers.
      - name: Scrape Reddit r/Scams
        if: |
          github.event.inputs.feed == 'all' || github.event.inputs.feed == 'reddit'
          || (github.event_name == 'schedule' && (github.event.schedule == '0 */6 * * *' || github.event.schedule == '0 16 * * *'))
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -m reddit_scams

  notify-failure:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *Scraper failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"
            }"
