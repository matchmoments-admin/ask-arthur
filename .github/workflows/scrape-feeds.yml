name: Scrape Threat Feeds

on:
  schedule:
    # Daily, staggered across the hour so feed_items don't all spike in the same
    # minute and the dashboard's source-mix doesn't flatten to "Reddit at any hour".
    # Each non-Reddit step below gates on its assigned `github.event.schedule`.
    - cron: "0 6 * * *" # Reddit r/Scams (short half-life)
    - cron: "15 6 * * *" # urlhaus, threatfox
    - cron: "30 6 * * *" # openphish, phishstats
    - cron: "45 6 * * *" # crtsh, phishing_database
    - cron: "0 7 * * *" # ipsum, feodo, phishing_army, cryptoscamdb
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to scrape (or "all")'
        required: true
        default: "all"
        type: choice
        options:
          - all
          - urlhaus
          - phishstats
          - phishing_database
          - crtsh
          - threatfox
          - openphish
          - phishing_army
          - ipsum
          - feodo
          - cryptoscamdb
          - reddit

jobs:
  scrape:
    # Set ENABLE_SCRAPER to "true" in GitHub repo variables to allow scheduled runs.
    # Manual workflow_dispatch always runs regardless of this setting.
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCRAPER == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: pipeline/scrapers

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pipeline/scrapers

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape URLhaus
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'urlhaus' || (github.event_name == 'schedule' && github.event.schedule == '15 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m urlhaus

      - name: Scrape PhishStats
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishstats' || (github.event_name == 'schedule' && github.event.schedule == '30 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishstats

      - name: Scrape Phishing.Database
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_database' || (github.event_name == 'schedule' && github.event.schedule == '45 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishing_database

      - name: Scrape crt.sh
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'crtsh' || (github.event_name == 'schedule' && github.event.schedule == '45 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m crtsh

      - name: Scrape ThreatFox
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'threatfox' || (github.event_name == 'schedule' && github.event.schedule == '15 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m threatfox

      - name: Scrape OpenPhish
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'openphish' || (github.event_name == 'schedule' && github.event.schedule == '30 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m openphish

      - name: Scrape Phishing Army
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_army' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishing_army

      - name: Scrape IPsum
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'ipsum' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m ipsum

      - name: Scrape Feodo Tracker
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'feodo' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m feodo

      - name: Scrape CryptoScamDB
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'cryptoscamdb' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m cryptoscamdb

      - name: Probe Reddit endpoints
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'reddit' || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
        continue-on-error: true
        run: |
          echo "=== Reddit endpoint probe ($(date -u +%Y-%m-%dT%H:%M:%SZ)) ==="
          echo "Runner IP: $(curl -sf https://api.ipify.org || echo 'unknown')"
          echo ""
          for endpoint in \
            "https://old.reddit.com/r/Scams/new.json?limit=1&raw_json=1" \
            "https://www.reddit.com/r/Scams/new.json?limit=1&raw_json=1" \
            "https://www.reddit.com/r/Scams/new/.rss"; do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "User-Agent: AskArthur-ThreatFeed/1.0 (+https://askarthur.au)" \
              --max-time 15 "$endpoint" || echo "000")
            echo "$status $endpoint"
          done

      - name: Scrape Reddit r/Scams
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'reddit' || (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -m reddit_scams

  # -----------------------------------------------------------------------
  # Notify on failure — posts to Slack incoming webhook
  # -----------------------------------------------------------------------
  notify-failure:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *Scraper failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":rotating_light: *Threat Feed Scraper Failed*\n\n*Trigger:* ${{ github.event_name }} (${{ github.event.schedule || github.event.inputs.feed || 'manual' }})\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"
                  }
                }
              ]
            }"
