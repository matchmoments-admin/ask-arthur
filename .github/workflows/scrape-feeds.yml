name: Scrape Threat Feeds

on:
  schedule:
    # Weekly on Sunday at midnight UTC (conserve GitHub Actions minutes)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to scrape (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - urlhaus
          - phishstats
          - phishing_database
          - crtsh
          - threatfox
          - openphish
          - phishing_army
          - ipsum
          - feodo
          - cryptoscamdb

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: pipeline/scrapers

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pipeline/scrapers

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape URLhaus
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'urlhaus' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m urlhaus

      - name: Scrape PhishStats
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishstats' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishstats

      - name: Scrape Phishing.Database
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_database' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishing_database

      - name: Scrape crt.sh
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'crtsh' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m crtsh

      - name: Scrape ThreatFox
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'threatfox' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m threatfox

      - name: Scrape OpenPhish
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'openphish' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m openphish

      - name: Scrape Phishing Army
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_army' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishing_army

      - name: Scrape IPsum
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'ipsum' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m ipsum

      - name: Scrape Feodo Tracker
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'feodo' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m feodo

      - name: Scrape CryptoScamDB
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'cryptoscamdb' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m cryptoscamdb
