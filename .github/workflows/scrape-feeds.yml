name: Scrape Threat Feeds

on:
  schedule:
    # Once daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to scrape (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - urlhaus
          - phishtank
          - phishstats
          - phishing_database
          - crtsh

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pipeline/scrapers

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pipeline/scrapers

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape URLhaus
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'urlhaus' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m urlhaus

      - name: Scrape PhishTank
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishtank' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishtank

      - name: Scrape PhishStats
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishstats' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishstats

      - name: Scrape Phishing.Database
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'phishing_database' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m phishing_database

      - name: Scrape crt.sh
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'crtsh' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m crtsh
