name: Scrape Vulnerability Feeds

# Weekly vulnerability intelligence scrapers (Phase 14 Sprint 1).
# First feed: CISA KEV. NVD, GHSA, OSV, CERT AU follow in Sprint 2.

on:
  schedule:
    # Weekly Sunday 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      feed:
        description: 'Which feed to scrape (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cisa_kev

jobs:
  scrape:
    # Set ENABLE_VULN_SCRAPER to "true" in GitHub repo variables to allow
    # scheduled runs. Manual workflow_dispatch always runs regardless.
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_VULN_SCRAPER == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: pipeline/scrapers

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pipeline/scrapers

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape CISA KEV
        if: github.event.inputs.feed == 'all' || github.event.inputs.feed == 'cisa_kev' || github.event_name == 'schedule'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m vulnerabilities.cisa_kev

  # -----------------------------------------------------------------------
  # Notify on failure — posts to Slack incoming webhook
  # -----------------------------------------------------------------------
  notify-failure:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *Vulnerability scraper failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":rotating_light: *Vulnerability Feed Scraper Failed*\n\n*Trigger:* ${{ github.event_name }} (${{ github.event.schedule || github.event.inputs.feed || 'manual' }})\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"
                  }
                }
              ]
            }"
